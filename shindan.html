<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>作家タイプ診断</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 30px;
    }
    .question {
      font-size: 20px;
      margin-bottom: 20px;
    }
    button {
      display: block;
      margin: 10px auto;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    #result {
      font-size: 24px;
      margin-top: 30px;
    }
  </style>
</head>
<body>

<h1>🎨 作家タイプ診断</h1>

<div id="quiz">
  <div class="question" id="question"></div>
  <div id="answers"></div>
</div>

<div id="result"></div>

<script>
const questions = [
  {
    text: "作品は直感で作ることが多い？",
    answers: [
      { text: "はい", type: "A" },
      { text: "いいえ", type: "B" }
    ]
  },
  {
    text: "計画を立てて制作する方？",
    answers: [
      { text: "はい", type: "B" },
      { text: "いいえ", type: "A" }
    ]
  },
  {
    text: "人に見せることを意識する？",
    answers: [
      { text: "はい", type: "C" },
      { text: "いいえ", type: "A" }
    ]
  },
  {
    text: "新しい表現を試すのが好き？",
    answers: [
      { text: "はい", type: "A" },
      { text: "いいえ", type: "B" }
    ]
  }
];

let current = 0;
let score = { A: 0, B: 0, C: 0 };

function showQuestion() {
  const q = questions[current];
  document.getElementById("question").innerText = q.text;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  q.answers.forEach(a => {
    const btn = document.createElement("button");
    btn.innerText = a.text;
    btn.onclick = () => {
      score[a.type]++;
      current++;
      if (current < questions.length) {
        showQuestion();
      } else {
        showResult();
      }
    };
    answersDiv.appendChild(btn);
  });
}

function showResult() {
  document.getElementById("quiz").style.display = "none";

  let resultText = "";

  if (score.A >= score.B && score.A >= score.C) {
    resultText = "🔥 直感型アーティスト\n自由で独創的！感性で突き進むタイプ";
  } else if (score.B >= score.A && score.B >= score.C) {
    resultText = "🧠 設計型アーティスト\n構成力と完成度で勝負するタイプ";
  } else {
    resultText = "🌍 共感型アーティスト\n人の心を動かす作品が得意なタイプ";
  }

  document.getElementById("result").innerText = resultText;
}

showQuestion();
</script>

</body>
</html>
